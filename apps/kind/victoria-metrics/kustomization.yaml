apiVersion: kustomize.config.k8s.io/v1beta1
resources:
  - ../../base/victoria-metrics/metrics.yaml
  - ../../base/victoria-metrics/metrics-cadvisor.yaml
patches:
  - target:
      kind: VMNodeScrape
      name:  cadvisor
    patch: |
      apiVersion: operator.victoriametrics.com/v1beta1
      kind: VMNodeScrape
      metadata:
        name: cadvisor
      spec:
        tlsConfig:
          insecureSkipVerify: true