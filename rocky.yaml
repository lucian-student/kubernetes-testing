targets:
  incus:
    vm:
      size: 26843545600 # 25 GiB in bytes (25 * 1024 * 1024 * 1024)
      filesystem: ext4
files:
  - generator: fstab         # /etc/fstab file system table
  - generator: incus-agent
  - generator: hostname
    path: /etc/hostname
  - generator: hosts
    path: /etc/hosts
  - generator: dump
    path: /etc/sysctl.d/99-kubernetes-cri.conf
    content: |
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1

packages:
  # 1. Choose the backend package manager engine
  manager: dnf

  # 2. Update all underlying system packages to the latest release
  update: true

  # 3. Explicitly declare core packages to inject
  sets:
    - action: install
      packages:
      # --- Vital System & Boot Utilities ---
      - kernel
      - grub2-efi-x64        # Required for UEFI booting
      - shim-x64             # Required for secure boot chain compatibility
      - efibootmgr           # Allows configuring UEFI boot entries during build
      - linux-firmware       # Provides essential device drivers for the guest kernel
      - openssh-server
      - NetworkManager
      - tar

      # --- K8s Networking Dependencies ---
      - iptables # Needed by kube-proxy to route internal cluster pod traffic
      - iproute # Grants the node low-level network management binaries (ip, bridge)
      - conntrack-tools # Essential for tracking network state connections across pods
      - socat # Required by the kubelet agent to forward traffic ports (kubectl port-forward)

      # --- Diagnostic & Troubleshooting Tools ---
      - curl # Used to fetch configurations, manifests, and pull binaries
      - wget # Standard alternate retrieval tool
      - iputils # Includes the 'ping' command for debugging pod-to-pod links
      - python3-libdnf
  repositories: []
  
actions:
  - trigger: post-packages
    action: |-
      #!/bin/bash
      # Generate GRUB config
      grub2-mkconfig -o /boot/grub2/grub.cfg
      
      # Ensure default boot entry (set to 0 for first entry)
      sed -i 's/^#GRUB_DEFAULT=.*/GRUB_DEFAULT=0/' /etc/default/grub
      
      # Install GRUB for UEFI
      grub2-install --target=x86_64-efi --efi-directory=/boot/efi --bootloader-id=rocky
      
      # Regenerate config with new defaults
      grub2-mkconfig -o /boot/grub2/grub.cfg
      
      # Enable services
      systemctl enable NetworkManager.service
      systemctl enable sshd.service
      systemctl enable incus-agent.service
      systemctl enable systemd-modules-load.service

mappings:
  architecture_map: centos
