apiVersion: flux.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-sources
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./infrastructure/kind/sources
  prune: true
  sourceRef:
    name: flux-system
    kind: GitRepository
  dependsOn: 
    - name: crds
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  namespace: flux-system
  name: infra-kustomization
spec:
  interval: 10m0s
  path: ./infrastructure/kind/kustomization
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: infra-sources