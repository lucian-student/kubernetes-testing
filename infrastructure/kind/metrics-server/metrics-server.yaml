apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metrics-server
  namespace: flux-system
spec: 
  chart:
    spec:
      chart: metrics-server
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: metrics-server
        namespace: flux-system
      version: 3.13.0
  interval: 10m
  storageNamespace: kube-system
  targetNamespace: kube-system
  values:
    args:
      - --kubelet-insecure-tls
    