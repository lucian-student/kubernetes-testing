apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  namespace: flux-system
  name: cert-manager-controller
spec:
  interval: 10m0s
  path: ./infrastructure/kind/cert-manager/controller
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  namespace: flux-system
  name: cert-manager-config
spec:
  interval: 10m0s
  path: ./infrastructure/kind/cert-manager/config
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: cert-manager-controller
  wait: true