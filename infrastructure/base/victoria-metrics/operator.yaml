apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vm-operator
  namespace: flux-system
spec:
  chart:
    spec:
      chart: victoria-metrics-operator
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: vm
  interval: 1m0s
  targetNamespace: kube-system
  storageNamespace: kube-system
  values:
    image:
      registry: "docker.io"
      repository: victoriametrics/operator
    replicaCount: 1
    operator:
      disable_prometheus_converter: false
    fullnameOverride: "victoria-metrics-operator"
    logLevel: "info"
    allowedMetricsEndpoints:
      - /metrics
      - /metrics/resources
    #Spučtíni validační webhooky, při vytváření a upravování CRD definovaných Victoria-Metrics
    admissionWebhooks:
      enabled: true
      disabledFor: []
      policy: Fail
      certManager:
        enabled: true
        issuer: 
          name: cluster-issuer
          kind: ClusterIssuer
        cert:
          duration: 45800h0m0s
      keepTLSSecret: true
    #Spustí montioring operatora, využije: VMServiceScrape
    crds:
      enabled: true
      plain: true
    serviceMonitor:
      enabled: true
      vm: true