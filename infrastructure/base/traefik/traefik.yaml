apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: flux-system
spec:
  chartRef: 
    name: traefik
    kind: HelmChart
  interval: 1m0s
  storageNamespace: kube-system
  targetNamespace: kube-system
  install:
    crds: Skip
  upgrade:
    crds: Skip
  values:
    image:
      registry: docker.io
      repository: traefik
      tag: v3.7.0-rc.1
      pullPolicy: IfNotPresent
    volumes: []
    deployment:
       replicas: 1
    env:
    - name: SSLKEYLOGFILE
      value: "/tmp/premaster.txt"
    providers:
      kubernetesIngress:
        enabled: true
      kubernetesCRD:
        enabled: true
      kubernetesGateway:
        enabled: true
    #service:
    #  annotations:
    #    kube-vip.io/loadbalancerIPs: 192.168.56.99
    ingressClass:
      name: traefik
    gatewayClass:
      enabled: true
      name: traefik
    gateway:
      enabled: false
    ingressRoute:
      dashboard:
        enabled: false
        # Custom match rule with host domain
        matchRule: Host(`local.traefik.com`)
        entryPoints: ["websecure"]
        # Add custom middlewares : authentication and redirection
        middlewares:
          - name: traefik-dashboard-auth
    logs:
      general:
        format: json
        level: TRACE
      access:
        enabled: true
    #experimental:
    #  plugins:
    #    traefik-oidc-auth:
    #      moduleName: "github.com/sevensolutions/traefik-oidc-auth"
    #      version: "v0.16.0"
      